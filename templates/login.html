<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment System – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Sora', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(16,185,129,0.10) 0%, transparent 60%),
        var(--bg);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image: 
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .login-card {
      position: relative; z-index: 10;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px;
      width: 440px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
    }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }
    .logo-area p { color: var(--text-muted); font-size: 13px; margin: 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .alert.error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .hint {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .hint p { text-align: center; color: var(--text-muted); font-size: 12px; margin: 0 0 10px; }
    .role-badges {
      display: flex; gap: 8px; justify-content: center;
    }
    .role-badge {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>
  
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">📚</div>
      <h1>Assignment Portal</h1>
      <p>Sign in to continue to your dashboard</p>
    </div>

    <div class="form-group">
      <label>User ID</label>
      <input type="text" id="userId" placeholder="Enter your user ID" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In →</button>

    <div class="alert" id="alertBox"></div>

    <div class="hint">
      <p>System Roles</p>
      <div class="role-badges">
        <span class="role-badge">🔑 Admin</span>
        <span class="role-badge">🎓 Professor</span>
        <span class="role-badge">📖 Student</span>
      </div>
    </div>
  </div>

  <script>
    const alertBox = document.getElementById('alertBox');
    const loginBtn = document.getElementById('loginBtn');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = `alert ${type}`;
      alertBox.style.display = 'block';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!userId || !password) {
        showAlert('Please enter both User ID and password', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      alertBox.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = data.redirect, 800);
        } else {
          showAlert(data.message || 'Invalid credentials', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In →';
        }
      } catch (err) {
        showAlert('Connection error. Please try again.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In →';
      }
    }
  </script>
</body>
</html>
