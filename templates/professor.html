<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor – Assignment System</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">📚</div>
      <div class="brand">Assignment<span>System</span></div>
    </div>
    <div class="sidebar-user">
      <div class="user-name">{{ name }}</div>
      <div class="user-role">Professor</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Classrooms</div>
      <button class="nav-item active" onclick="showSection('classrooms')"><span class="nav-icon">🏫</span> All Classrooms</button>
      <button class="nav-item" id="nav-detail" onclick="showSection('detail')" style="display:none"><span class="nav-icon">📋</span> Classroom Detail</button>
    </nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="logout()">⬡ Sign Out</button></div>
  </aside>

  <main class="main-content">

    <!-- ── CLASSROOM LIST ── -->
    <div id="section-classrooms">
      <div class="top-bar">
        <div><h2>My Classrooms</h2><div class="subtitle">Manage classrooms and track submissions</div></div>
        <button class="btn btn-primary" onclick="openModal('modalCreateClassroom')">+ New Classroom</button>
      </div>
      <div class="page-content">
        <div id="classrooms-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
          <div class="empty-state"><div class="icon">🏫</div><p>Loading...</p></div>
        </div>
      </div>
    </div>

    <!-- ── CLASSROOM DETAIL ── -->
    <div id="section-detail" style="display:none">
      <div class="top-bar">
        <div><h2 id="detail-title">Classroom</h2><div class="subtitle" id="detail-subtitle"></div></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" onclick="showSection('classrooms')">← Back</button>
          <button class="btn btn-primary" onclick="openModal('modalCreateAssignment')">+ Assignment</button>
        </div>
      </div>
      <div class="page-content">
        <!-- Enrolled students -->
        <div class="card" style="margin-bottom:20px">
          <div class="card-title">Enrolled Students <span id="enrolled-count" style="font-weight:400;color:var(--text-muted);font-size:13px"></span></div>
          <div id="enrolled-students" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px"></div>
        </div>
        <!-- Assignments -->
        <div class="section-title" style="margin-bottom:14px">Assignments & Submissions</div>
        <div id="assignments-list"></div>
      </div>
    </div>

  </main>
</div>

<!-- Create Classroom Modal -->
<div class="modal-overlay" id="modalCreateClassroom">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create Classroom</div>
      <button class="modal-close" onclick="closeModal('modalCreateClassroom')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Classroom Name</label>
        <input type="text" id="classroom-name" placeholder="e.g. CS101 – Data Structures">
      </div>
      <div class="form-group">
        <label>Select Students</label>
        <input type="text" id="student-search" placeholder="Search students..." oninput="filterStudents(this.value)" style="margin-bottom:8px">
        <div class="student-select-list" id="student-select-list">
          <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Loading students...</div>
        </div>
        <div style="margin-top:6px;font-size:12px;color:var(--text-muted)"><span id="selected-count">0</span> selected</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalCreateClassroom')">Cancel</button>
      <button class="btn btn-primary" onclick="createClassroom()">Create</button>
    </div>
  </div>
</div>

<!-- Create Assignment Modal (title + deadline ONLY, no file) -->
<div class="modal-overlay" id="modalCreateAssignment">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Post Assignment</div>
      <button class="modal-close" onclick="closeModal('modalCreateAssignment')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Assignment Title</label>
        <input type="text" id="assign-title" placeholder="e.g. Lab 1 – Linked Lists">
      </div>
      <div class="form-group">
        <label>Description <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <textarea id="assign-desc" placeholder="Describe the task..."></textarea>
      </div>
      <div class="form-group">
        <label>Submission Deadline</label>
        <input type="datetime-local" id="assign-deadline">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalCreateAssignment')">Cancel</button>
      <button class="btn btn-primary" id="btn-post-assign" onclick="createAssignment()">Post Assignment</button>
    </div>
  </div>
</div>

<!-- Submissions Modal -->
<div class="modal-overlay" id="modalSubmissions">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <div class="modal-title" id="submissions-title">Student Submissions</div>
      <button class="modal-close" onclick="closeModal('modalSubmissions')">✕</button>
    </div>
    <div id="submissions-list-modal"></div>
  </div>
</div>

<script src="/static/js/common.js"></script>
<script>
  let allStudents = [], selectedStudents = new Set(), currentClassroomId = null;

  function showSection(name) {
    document.getElementById('section-classrooms').style.display = name==='classrooms'?'block':'none';
    document.getElementById('section-detail').style.display    = name==='detail'    ?'block':'none';
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if (name==='classrooms') { document.querySelectorAll('.nav-item')[0].classList.add('active'); loadClassrooms(); }
    else { document.getElementById('nav-detail').style.display='flex'; document.querySelectorAll('.nav-item')[1].classList.add('active'); }
  }

  async function loadClassrooms() {
    const data = await apiCall('/api/professor/classrooms');
    const grid = document.getElementById('classrooms-grid');
    if (!data.success||!data.classrooms.length) {
      grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="icon">🏫</div><p>No classrooms yet</p></div>`; return;
    }
    grid.innerHTML = data.classrooms.map(c=>`
      <div class="classroom-card fade-in" onclick="openClassroom('${c.classroom_id}')">
        <div class="classroom-name">${c.name}</div>
        <div class="classroom-meta" style="margin-top:8px;display:flex;gap:14px">
          <span>👥 ${(c.student_ids||[]).length} students</span>
          <span>📝 ${c.assignment_count} assignments</span>
        </div>
        <div style="margin-top:10px"><span class="badge badge-primary">Active</span></div>
      </div>`).join('');
  }

  async function openClassroom(id) {
    currentClassroomId = id; showSection('detail');
    const data = await apiCall(`/api/professor/classroom/${id}`);
    if (!data.success) { showToast('Failed to load','error'); return; }
    const c = data.classroom;
    document.getElementById('detail-title').textContent    = c.name;
    document.getElementById('detail-subtitle').textContent = `${(c.students||[]).length} students enrolled`;
    document.getElementById('enrolled-count').textContent  = `(${(c.students||[]).length})`;
    const enDiv = document.getElementById('enrolled-students');
    enDiv.innerHTML = (c.students||[]).length
      ? c.students.map(s=>`<span class="badge badge-neutral" title="${s.email}">👤 ${s.name}</span>`).join('')
      : '<span style="color:var(--text-muted);font-size:13px">No students enrolled</span>';

    const aDiv = document.getElementById('assignments-list');
    if (!c.assignments?.length) {
      aDiv.innerHTML=`<div class="empty-state"><div class="icon">📝</div><p>No assignments yet</p></div>`; return;
    }
    aDiv.innerHTML = c.assignments.map(a => {
      const ds = getDeadlineStatus(a.deadline);
      const pending = a.submission_count - a.accepted_count;
      return `
        <div class="assignment-item fade-in">
          <div class="assignment-info">
            <div class="title">📄 ${a.title}</div>
            <div class="deadline ${ds.cls}">⏰ ${ds.label}</div>
            ${a.description?`<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${a.description}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
            <div style="text-align:center">
              <div style="font-size:20px;font-weight:700;color:var(--primary)">${a.submission_count}</div>
              <div style="font-size:10px;color:var(--text-muted)">submitted</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:20px;font-weight:700;color:var(--accent)">${a.accepted_count}</div>
              <div style="font-size:10px;color:var(--text-muted)">accepted</div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="viewSubmissions('${id}','${a.assignment_id}','${a.title}')">Review (${pending} pending)</button>
          </div>
        </div>`;
    }).join('');
  }

  async function loadStudentsForModal() {
    if (allStudents.length) { renderStudentList(allStudents); return; }
    const data = await apiCall('/api/professor/students');
    if (data.success) { allStudents=data.students; renderStudentList(allStudents); }
  }

  function renderStudentList(students) {
    const list = document.getElementById('student-select-list');
    if (!students.length) { list.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">No students</div>'; return; }
    list.innerHTML = students.map(s=>`
      <label class="student-select-item">
        <input type="checkbox" value="${s.user_id}" ${selectedStudents.has(s.user_id)?'checked':''} onchange="toggleStudent('${s.user_id}')">
        <div class="info"><div class="name">${s.name}</div><div class="dept">${s.department||'—'} · ${s.email}</div></div>
      </label>`).join('');
  }

  function filterStudents(q) {
    renderStudentList(allStudents.filter(s=>
      s.name.toLowerCase().includes(q.toLowerCase())||
      (s.department||'').toLowerCase().includes(q.toLowerCase())||
      s.email.toLowerCase().includes(q.toLowerCase())));
  }

  function toggleStudent(id) {
    selectedStudents.has(id)?selectedStudents.delete(id):selectedStudents.add(id);
    document.getElementById('selected-count').textContent=selectedStudents.size;
  }

  async function createClassroom() {
    const name = document.getElementById('classroom-name').value.trim();
    if (!name) { showToast('Name required','error'); return; }
    const data = await apiCall('/api/professor/create_classroom',{
      method:'POST', body:JSON.stringify({name, student_ids:[...selectedStudents]})});
    if (data.success) {
      showToast(data.message,'success'); closeModal('modalCreateClassroom');
      document.getElementById('classroom-name').value=''; selectedStudents.clear();
      document.getElementById('selected-count').textContent='0';
      loadClassrooms();
    } else showToast(data.message,'error');
  }

  async function createAssignment() {
    const title    = document.getElementById('assign-title').value.trim();
    const deadline = document.getElementById('assign-deadline').value;
    const desc     = document.getElementById('assign-desc').value.trim();
    if (!title||!deadline) { showToast('Title and deadline required','error'); return; }
    const btn = document.getElementById('btn-post-assign');
    btn.disabled=true; btn.textContent='Posting...';
    const data = await apiCall('/api/professor/create_assignment',{
      method:'POST', body:JSON.stringify({
        classroom_id: currentClassroomId, title, description:desc,
        deadline: new Date(deadline).toISOString()})});
    btn.disabled=false; btn.textContent='Post Assignment';
    if (data.success) {
      showToast(data.message,'success'); closeModal('modalCreateAssignment');
      document.getElementById('assign-title').value='';
      document.getElementById('assign-desc').value='';
      document.getElementById('assign-deadline').value='';
      openClassroom(currentClassroomId);
    } else showToast(data.message,'error');
  }

  async function viewSubmissions(cid, aid, title) {
    document.getElementById('submissions-title').textContent=`Submissions – ${title}`;
    document.getElementById('submissions-list-modal').innerHTML='<div style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</div>';
    openModal('modalSubmissions');
    const data = await apiCall(`/api/professor/submissions/${cid}/${aid}`);
    const div  = document.getElementById('submissions-list-modal');
    if (!data.success||!data.submissions.length) {
      div.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No submissions yet — students have not submitted</p></div>'; return;
    }
    div.innerHTML = data.submissions.map(s => {
      const accepted = s.accepted;
      const expires  = s.github_expires_at
        ? `Expires from GitHub: ${new Date(s.github_expires_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`
        : '';
      return `
        <div class="assignment-item" style="flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
            <div>
              <div class="title">👤 ${s.student_name||s.student_id}</div>
              <div style="font-size:11px;color:var(--text-muted)">${s.student_email||''}</div>
              <div class="deadline">Submitted: ${formatDeadline(s.submitted_at)}</div>
            </div>
            ${accepted
              ? `<div style="text-align:right">
                   <span class="badge badge-success">✓ Accepted</span>
                   ${expires?`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">🕐 ${expires}</div>`:''}
                 </div>`
              : `<button class="btn btn-success btn-sm" onclick="acceptSubmission('${cid}','${aid}','${s.student_id}',this)">✓ Accept</button>`
            }
          </div>
          ${s.github_url
            ? `<a href="${s.github_url}" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none">
                 📎 View Submitted PDF on GitHub
               </a>`
            : (s.file_expired
                ? `<span style="font-size:12px;color:var(--text-muted)">⚠ File expired and removed from GitHub</span>`
                : '')
          }
        </div>`;
    }).join('');
  }

  async function acceptSubmission(cid, aid, sid, btn) {
    if (!confirm('Accept this submission? The file will be kept on GitHub for 30 days.')) return;
    btn.disabled=true; btn.textContent='Accepting...';
    const data = await apiCall('/api/professor/accept_submission',{
      method:'POST', body:JSON.stringify({classroom_id:cid, assignment_id:aid, student_id:sid})});
    if (data.success) {
      showToast(data.message,'success');
      // refresh modal content
      const titleEl = document.getElementById('submissions-title');
      const assignTitle = titleEl.textContent.replace('Submissions – ','');
      viewSubmissions(cid, aid, assignTitle);
      openClassroom(cid);
    } else {
      btn.disabled=false; btn.textContent='✓ Accept';
      showToast(data.message,'error');
    }
  }

  const origOpen = window.openModal;
  window.openModal = function(id) {
    origOpen(id);
    if (id==='modalCreateClassroom') loadStudentsForModal();
  };

  loadClassrooms();
</script>
</body>
</html>
